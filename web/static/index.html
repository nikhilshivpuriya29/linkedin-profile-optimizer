<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Profile Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { 800: '#1e1e2e', 900: '#11111b', 700: '#313244', 600: '#45475a' }
                    }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #4a5568 transparent; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
        .score-ring { animation: pulse-ring 2s ease-in-out infinite; }
        .drag-over { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-900 text-gray-900 dark:text-gray-100 font-sans min-h-screen transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // ─── Score Ring Component ─────────────────────────────────────────
        function ScoreRing({ score, size = 120, label }) {
            const radius = (size - 12) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (score / 100) * circumference;
            const color = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : score >= 40 ? '#f97316' : '#ef4444';

            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} className="transform -rotate-90">
                        <circle cx={size/2} cy={size/2} r={radius} stroke="currentColor" strokeWidth="8"
                            fill="none" className="text-gray-200 dark:text-dark-700" />
                        <circle cx={size/2} cy={size/2} r={radius} stroke={color} strokeWidth="8"
                            fill="none" strokeDasharray={circumference} strokeDashoffset={offset}
                            strokeLinecap="round" className="transition-all duration-1000" />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center" style={{width: size, height: size}}>
                        <span className="text-2xl font-bold">{score}</span>
                        <span className="text-xs text-gray-500 dark:text-gray-400">/ 100</span>
                    </div>
                    {label && <span className="mt-2 text-sm font-medium text-gray-600 dark:text-gray-400">{label}</span>}
                </div>
            );
        }

        // ─── Section Score Card ───────────────────────────────────────────
        function SectionScore({ name, score }) {
            const color = score >= 80 ? 'bg-emerald-500' : score >= 60 ? 'bg-amber-500' : score >= 40 ? 'bg-orange-500' : 'bg-red-500';
            const icons = { headline: '✏️', about: '📝', experience: '💼', skills: '🎯', education: '🎓', engagement: '📊' };
            return (
                <div className="bg-white dark:bg-dark-800 rounded-xl p-4 border border-gray-200 dark:border-dark-700 fade-in">
                    <div className="flex items-center justify-between mb-2">
                        <span className="text-sm font-medium capitalize">{icons[name]} {name}</span>
                        <span className="text-sm font-bold">{score}%</span>
                    </div>
                    <div className="w-full bg-gray-200 dark:bg-dark-700 rounded-full h-2">
                        <div className={`${color} h-2 rounded-full transition-all duration-1000`} style={{width: `${score}%`}}></div>
                    </div>
                </div>
            );
        }

        // ─── Chat Message Component ───────────────────────────────────────
        function ChatMessage({ msg }) {
            const isUser = msg.role === 'user';
            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} fade-in`}>
                    <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-sm leading-relaxed ${
                        isUser
                            ? 'bg-brand-600 text-white rounded-br-md'
                            : 'bg-gray-100 dark:bg-dark-700 text-gray-900 dark:text-gray-100 rounded-bl-md'
                    }`}>
                        <div className="whitespace-pre-wrap">{msg.content}</div>
                    </div>
                </div>
            );
        }

        // ─── Main App ─────────────────────────────────────────────────────
        function App() {
            const [darkMode, setDarkMode] = useState(true);
            const [linkedinUrl, setLinkedinUrl] = useState('');
            const [liAtCookie, setLiAtCookie] = useState('');
            const [githubUrl, setGithubUrl] = useState('');
            const [resumeFile, setResumeFile] = useState(null);
            const [analyzing, setAnalyzing] = useState(false);
            const [results, setResults] = useState(null);
            const [messages, setMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [chatLoading, setChatLoading] = useState(false);
            const [dragOver, setDragOver] = useState(false);
            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
            }, [darkMode]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // ─── Analyze Profile ──────────────────────────────────────────
            const handleAnalyze = async () => {
                if (!linkedinUrl && !resumeFile && !githubUrl) {
                    alert('Please provide at least one input (LinkedIn URL, resume, or GitHub URL)');
                    return;
                }
                setAnalyzing(true);
                setResults(null);

                const formData = new FormData();
                if (linkedinUrl) formData.append('linkedin_url', linkedinUrl);
                if (liAtCookie) formData.append('li_at_cookie', liAtCookie);
                if (githubUrl) formData.append('github_url', githubUrl);
                if (resumeFile) formData.append('resume', resumeFile);

                try {
                    const resp = await fetch('/api/analyze', { method: 'POST', body: formData });
                    const data = await resp.json();
                    setResults(data);

                    // Auto-send welcome message in chat
                    const score = data.analysis?.overall || 0;
                    const welcomeMsg = `🎯 Profile Analysis Complete!\n\nYour overall LinkedIn score: ${score}/100\n\n${score >= 80 ? "Great job! Your profile is strong." : score >= 60 ? "Good foundation! Let's optimize it further." : "There's room for improvement. Let me help!"}\n\nI've analyzed your full profile. Ask me anything:\n• "Rewrite my headline"\n• "Improve my About section"\n• "Give me post ideas"\n• "What keywords should I add?"`;

                    setMessages([{ role: 'assistant', content: welcomeMsg }]);
                } catch (err) {
                    alert('Analysis failed: ' + err.message);
                } finally {
                    setAnalyzing(false);
                }
            };

            // ─── Chat ─────────────────────────────────────────────────────
            const sendMessage = async (text) => {
                const msg = text || chatInput.trim();
                if (!msg || chatLoading) return;

                const newMessages = [...messages, { role: 'user', content: msg }];
                setMessages(newMessages);
                setChatInput('');
                setChatLoading(true);

                try {
                    const resp = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: newMessages.filter(m => m.role !== 'system').map(m => ({
                                role: m.role, content: m.content
                            }))
                        })
                    });
                    const data = await resp.json();
                    if (data.response) {
                        setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
                    } else if (data.detail) {
                        setMessages(prev => [...prev, { role: 'assistant', content: `⚠️ Error: ${data.detail}` }]);
                    }
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: `⚠️ Connection error: ${err.message}` }]);
                } finally {
                    setChatLoading(false);
                }
            };

            // ─── File Drop ────────────────────────────────────────────────
            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') setResumeFile(file);
            };

            const quickActions = [
                { label: '✏️ Headline', msg: 'Rewrite my LinkedIn headline to be more compelling and keyword-rich' },
                { label: '📝 About', msg: 'Write me an optimized About section based on my profile' },
                { label: '💡 Posts', msg: 'Give me 5 LinkedIn post ideas based on my background' },
                { label: '🎯 Skills', msg: 'What top skills should I add to my LinkedIn profile?' },
                { label: '💼 Experience', msg: 'How can I improve my experience bullet points?' },
                { label: '🔍 Keywords', msg: 'What SEO keywords should I target for my industry?' },
            ];

            return (
                <div className="min-h-screen flex flex-col">
                    {/* ─── Header ─────────────────────────────────────────── */}
                    <header className="border-b border-gray-200 dark:border-dark-700 bg-white dark:bg-dark-800 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-gradient-to-br from-brand-500 to-brand-700 rounded-lg flex items-center justify-center">
                                <span className="text-white text-sm font-bold">Li</span>
                            </div>
                            <h1 className="text-lg font-bold bg-gradient-to-r from-brand-600 to-brand-400 bg-clip-text text-transparent">
                                LinkedIn Optimizer
                            </h1>
                        </div>
                        <button onClick={() => setDarkMode(!darkMode)}
                            className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-700 transition-colors"
                            aria-label="Toggle dark mode">
                            {darkMode ? '☀️' : '🌙'}
                        </button>
                    </header>

                    {/* ─── Main Layout ────────────────────────────────────── */}
                    <div className="flex-1 flex overflow-hidden">
                        {/* ─── Left Panel ─────────────────────────────────── */}
                        <div className="flex-1 overflow-y-auto p-6">
                            {/* ─── Input Cards ────────────────────────────── */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                {/* LinkedIn */}
                                <div className="bg-white dark:bg-dark-800 rounded-xl p-5 border border-gray-200 dark:border-dark-700 shadow-sm">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-xl">🔗</span>
                                        <h3 className="font-semibold text-sm">LinkedIn Profile</h3>
                                    </div>
                                    <input type="text" placeholder="https://linkedin.com/in/username"
                                        value={linkedinUrl} onChange={e => setLinkedinUrl(e.target.value)}
                                        className="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-dark-600 bg-gray-50 dark:bg-dark-900 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition mb-3" />
                                    <input type="text" placeholder="li_at cookie value"
                                        value={liAtCookie} onChange={e => setLiAtCookie(e.target.value)}
                                        className="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-dark-600 bg-gray-50 dark:bg-dark-900 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition" />
                                    <p className="text-xs text-gray-500 dark:text-gray-400 mt-2">
                                        How to get: F12 → Application → Cookies → li_at
                                    </p>
                                </div>

                                {/* Resume */}
                                <div className="bg-white dark:bg-dark-800 rounded-xl p-5 border border-gray-200 dark:border-dark-700 shadow-sm">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-xl">📄</span>
                                        <h3 className="font-semibold text-sm">Resume PDF</h3>
                                    </div>
                                    <div
                                        className={`border-2 border-dashed rounded-lg p-4 text-center cursor-pointer transition-all ${
                                            dragOver ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-300 dark:border-dark-600 hover:border-brand-400'
                                        }`}
                                        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                                        onDragLeave={() => setDragOver(false)}
                                        onDrop={handleDrop}
                                        onClick={() => fileInputRef.current?.click()}>
                                        <input ref={fileInputRef} type="file" accept=".pdf" className="hidden"
                                            onChange={e => setResumeFile(e.target.files[0])} />
                                        {resumeFile ? (
                                            <div className="text-sm">
                                                <p className="font-medium text-brand-600 dark:text-brand-400">✅ {resumeFile.name}</p>
                                                <p className="text-xs text-gray-500 mt-1">{(resumeFile.size / 1024).toFixed(1)} KB</p>
                                            </div>
                                        ) : (
                                            <div className="text-sm text-gray-500 dark:text-gray-400">
                                                <p className="text-2xl mb-1">📂</p>
                                                <p>Drop PDF here or click</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* GitHub */}
                                <div className="bg-white dark:bg-dark-800 rounded-xl p-5 border border-gray-200 dark:border-dark-700 shadow-sm">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-xl">🐙</span>
                                        <h3 className="font-semibold text-sm">GitHub Profile</h3>
                                    </div>
                                    <input type="text" placeholder="https://github.com/username"
                                        value={githubUrl} onChange={e => setGithubUrl(e.target.value)}
                                        className="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-dark-600 bg-gray-50 dark:bg-dark-900 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition" />
                                    <p className="text-xs text-gray-500 dark:text-gray-400 mt-3">
                                        Used to suggest technical content ideas
                                    </p>
                                </div>
                            </div>

                            {/* ─── Analyze Button ─────────────────────────── */}
                            <button onClick={handleAnalyze} disabled={analyzing}
                                className="w-full py-3.5 rounded-xl font-semibold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-brand-500/20 hover:shadow-brand-500/40 mb-8">
                                {analyzing ? (
                                    <span className="flex items-center justify-center gap-2">
                                        <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                        Analyzing...
                                    </span>
                                ) : '🔍 Analyze My Profile'}
                            </button>

                            {/* ─── Results ────────────────────────────────── */}
                            {results && results.analysis && (
                                <div className="space-y-6 fade-in">
                                    {/* Overall Score */}
                                    <div className="bg-white dark:bg-dark-800 rounded-xl p-6 border border-gray-200 dark:border-dark-700 flex flex-col items-center">
                                        <h2 className="text-lg font-bold mb-4">Your LinkedIn Score</h2>
                                        <div className="relative">
                                            <ScoreRing score={results.analysis.overall} size={140} />
                                        </div>
                                        <p className="mt-4 text-sm text-gray-600 dark:text-gray-400">
                                            {results.analysis.overall >= 80 ? 'Excellent! Your profile stands out.' :
                                             results.analysis.overall >= 60 ? 'Good start! A few tweaks will make it shine.' :
                                             'Lots of potential. Let\'s optimize together!'}
                                        </p>
                                    </div>

                                    {/* Section Scores */}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        {Object.entries(results.analysis.sections).map(([name, score]) => (
                                            <SectionScore key={name} name={name} score={score} />
                                        ))}
                                    </div>

                                    {/* Profile Data Cards */}
                                    {results.linkedin && !results.linkedin.error && (
                                        <div className="bg-white dark:bg-dark-800 rounded-xl p-6 border border-gray-200 dark:border-dark-700">
                                            <h3 className="font-bold mb-4 text-base">📋 Current Profile</h3>
                                            <div className="space-y-3 text-sm">
                                                <div>
                                                    <span className="text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wide">Name</span>
                                                    <p className="font-medium">{results.linkedin.name || 'Not found'}</p>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wide">Headline</span>
                                                    <p className="font-medium">{results.linkedin.headline || 'Empty — this needs work!'}</p>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wide">About</span>
                                                    <p className="text-gray-700 dark:text-gray-300">{results.linkedin.about ? results.linkedin.about.slice(0, 300) + '...' : 'No about section — missing a huge opportunity!'}</p>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wide">Skills ({results.linkedin.skills?.length || 0})</span>
                                                    <div className="flex flex-wrap gap-1.5 mt-1">
                                                        {(results.linkedin.skills || []).slice(0, 10).map((s, i) => (
                                                            <span key={i} className="px-2 py-0.5 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 rounded-full text-xs">{s}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* GitHub Card */}
                                    {results.github && !results.github.error && (
                                        <div className="bg-white dark:bg-dark-800 rounded-xl p-6 border border-gray-200 dark:border-dark-700">
                                            <h3 className="font-bold mb-4 text-base">🐙 GitHub Overview</h3>
                                            <div className="grid grid-cols-3 gap-4 text-center mb-4">
                                                <div>
                                                    <p className="text-2xl font-bold text-brand-600">{results.github.public_repos}</p>
                                                    <p className="text-xs text-gray-500">Repos</p>
                                                </div>
                                                <div>
                                                    <p className="text-2xl font-bold text-brand-600">{results.github.followers}</p>
                                                    <p className="text-xs text-gray-500">Followers</p>
                                                </div>
                                                <div>
                                                    <p className="text-2xl font-bold text-brand-600">{results.github.languages?.length || 0}</p>
                                                    <p className="text-xs text-gray-500">Languages</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5">
                                                {(results.github.languages || []).map((lang, i) => (
                                                    <span key={i} className="px-2 py-0.5 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 rounded-full text-xs">{lang}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Recommendations */}
                                    {results.analysis.recommendations?.length > 0 && (
                                        <div className="bg-white dark:bg-dark-800 rounded-xl p-6 border border-gray-200 dark:border-dark-700">
                                            <h3 className="font-bold mb-3 text-base">💡 Quick Wins</h3>
                                            <ul className="space-y-2">
                                                {results.analysis.recommendations.map((rec, i) => (
                                                    <li key={i} className="flex items-start gap-2 text-sm">
                                                        <span className="text-amber-500 mt-0.5">⚡</span>
                                                        <span>{rec}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}

                                    {/* Post Ideas */}
                                    {results.analysis.post_ideas?.length > 0 && (
                                        <div className="bg-white dark:bg-dark-800 rounded-xl p-6 border border-gray-200 dark:border-dark-700">
                                            <h3 className="font-bold mb-3 text-base">📢 Content Ideas</h3>
                                            <ul className="space-y-2">
                                                {results.analysis.post_ideas.map((idea, i) => (
                                                    <li key={i} className="text-sm p-2 rounded-lg bg-gray-50 dark:bg-dark-900 border border-gray-100 dark:border-dark-700">{idea}</li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Error Display */}
                            {results && results.linkedin?.error && (
                                <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-4 fade-in">
                                    <p className="text-sm text-red-700 dark:text-red-300">⚠️ LinkedIn: {results.linkedin.error}</p>
                                </div>
                            )}
                        </div>

                        {/* ─── Chat Panel (Right) ─────────────────────────── */}
                        <div className="w-[380px] border-l border-gray-200 dark:border-dark-700 bg-white dark:bg-dark-800 flex flex-col">
                            {/* Chat Header */}
                            <div className="p-4 border-b border-gray-200 dark:border-dark-700">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-gradient-to-br from-emerald-400 to-brand-500 rounded-full flex items-center justify-center">
                                        <span className="text-white text-xs font-bold">AI</span>
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-sm">LinkBot</h3>
                                        <p className="text-xs text-emerald-500">● Online</p>
                                    </div>
                                </div>
                            </div>

                            {/* Messages */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {messages.length === 0 && (
                                    <div className="text-center text-sm text-gray-500 dark:text-gray-400 mt-8">
                                        <p className="text-3xl mb-3">🤖</p>
                                        <p className="font-medium">Hi! I'm LinkBot</p>
                                        <p className="mt-1">Analyze your profile first, then I can help optimize it.</p>
                                    </div>
                                )}
                                {messages.map((msg, i) => <ChatMessage key={i} msg={msg} />)}
                                {chatLoading && (
                                    <div className="flex justify-start">
                                        <div className="bg-gray-100 dark:bg-dark-700 rounded-2xl rounded-bl-md px-4 py-3">
                                            <div className="flex gap-1">
                                                <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Quick Actions */}
                            {results && (
                                <div className="px-4 pb-2">
                                    <div className="flex flex-wrap gap-1.5">
                                        {quickActions.map((action, i) => (
                                            <button key={i} onClick={() => sendMessage(action.msg)}
                                                className="px-2.5 py-1 text-xs rounded-full bg-gray-100 dark:bg-dark-700 hover:bg-brand-50 dark:hover:bg-brand-900/30 hover:text-brand-600 dark:hover:text-brand-400 transition-colors border border-gray-200 dark:border-dark-600">
                                                {action.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Chat Input */}
                            <div className="p-4 border-t border-gray-200 dark:border-dark-700">
                                <div className="flex gap-2">
                                    <input type="text" value={chatInput}
                                        onChange={e => setChatInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && sendMessage()}
                                        placeholder={results ? "Ask LinkBot anything..." : "Analyze your profile first..."}
                                        disabled={!results}
                                        className="flex-1 px-3 py-2.5 text-sm rounded-xl border border-gray-300 dark:border-dark-600 bg-gray-50 dark:bg-dark-900 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none disabled:opacity-50 transition" />
                                    <button onClick={() => sendMessage()} disabled={!chatInput.trim() || chatLoading || !results}
                                        className="px-4 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                        →
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
